<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maintenance | Landasan Digital</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f4f4;
      color: #333;
    }

    header {
      background: #8B0000;
      color: white;
      padding: 20px 40px;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 80vh;
      text-align: center;
      padding: 20px;
    }

    .box {
      background: white;
      padding: 50px 40px;
      border-radius: 10px;
      border-top: 5px solid #cc0000;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      max-width: 600px;
      width: 100%;
    }

    .logo {
      max-width: 180px;
      width: 100%;
      height: auto;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 30px;
      margin-bottom: 15px;
      color: #8B0000;
    }

    p {
      font-size: 16px;
      color: #555;
      line-height: 1.6;
      margin: 10px 0;
    }

    .footer {
      text-align: center;
      padding: 15px;
      font-size: 13px;
      color: #777;
    }
  </style>
</head>

<body>

  <header>
    Landasan Digital
  </header>

  <div class="container">
    <div class="box">

      <img src="imgs/logo.png" alt="Landasan Digital Logo" class="logo" />

      <h1>Website Under Maintenance</h1>

      <p>
        We're currently improving our website to serve you better.
        Please check back shortly.
      </p>

      <p><i>Your Success Begins With Us</i></p>

    </div>
  </div>

  <div class="footer">
    © 2026 Landasan Digital Sdn. Bhd. All rights reserved.
  </div>

</body>
</html>
