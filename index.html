<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <title>Maintenance | Landasan Digital</title>

  <!-- Favicon (ICO) -->
  <link rel="icon" href="./imgs/favicon.ico">

  <!-- PNG fallback -->
  <link rel="icon" type="image/png" sizes="32x32" href="./imgs/favicon.png">

  <!-- Apple iOS icon -->
  <link rel="apple-touch-icon" sizes="180x180" href="./imgs/apple-touch-icon.png">

  <style>
    :root {
      --brand-red: #8B0000;
      --brand-red-dark: #5f0000;
      --brand-red-soft: #a21a1a;
      --text-main: #2c2c2c;
      --text-muted: #666;
      --bg-1: #faf8f8;
      --bg-2: #f0eeee;
      --line-soft: rgba(139, 0, 0, 0.12);
      --card-bg: rgba(255, 255, 255, 0.96);
      --shadow-main: 0 24px 60px rgba(0, 0, 0, 0.10);
      --shadow-soft: 0 10px 24px rgba(139, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at top left, rgba(139, 0, 0, 0.08), transparent 36%),
        radial-gradient(circle at bottom right, rgba(115, 115, 115, 0.08), transparent 30%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
    }

    body {
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    header {
      background: linear-gradient(90deg, var(--brand-red) 0%, var(--brand-red-dark) 100%);
      color: #fff;
      padding: 18px 32px;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .page-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 54px 20px 32px;
    }

    .panel {
      width: 100%;
      max-width: 820px;
      background: var(--card-bg);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow-main);
    }

    .top-line {
      height: 6px;
      background: linear-gradient(90deg, var(--brand-red-dark) 0%, var(--brand-red) 45%, #9b9b9b 100%);
    }

    .panel-inner {
      padding: 52px 54px 46px;
      text-align: center;
    }

    .logo {
      max-width: 190px;
      width: 100%;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 42px;
      color: var(--brand-red);
    }

    .lead {
      font-size: 17px;
      color: var(--text-muted);
    }
